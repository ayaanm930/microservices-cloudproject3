---
- name: Setup MicroK8s on EC2
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - snapd
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - software-properties-common
        state: present

    - name: Install MicroK8s
      snap:
        name: microk8s
        classic: yes
        channel: 1.30/stable

    - name: Add ubuntu user to microk8s group
      user:
        name: ubuntu
        groups: microk8s
        append: yes

    - name: Change ownership of ~/.kube
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Enable MicroK8s addons
      command: microk8s enable dns ingress registry hostpath-storage
      ignore_errors: yes

    - name: Install kubectl (snap)
      snap:
        name: kubectl
        classic: yes
        
    - name: Create kubectl alias for ubuntu user
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: "alias kubectl='microk8s kubectl'"
        create: yes

    - name: Install ArgoCD CLI
      get_url:
        url: https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        dest: /usr/local/bin/argocd
        mode: '0755'

    - name: Create ArgoCD namespace
      command: microk8s kubectl create namespace argocd
      register: ns_create
      failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
      changed_when: ns_create.rc == 0

    - name: Install ArgoCD
      command: microk8s kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      register: argo_install
      failed_when: argo_install.rc != 0 and 'Too long' not in argo_install.stderr
      changed_when: '"created" in argo_install.stdout or "configured" in argo_install.stdout'

    - name: Change ArgoCD server to NodePort
      command: >
        microk8s kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "NodePort", "ports": [{"port": 80,"targetPort": 8080,"nodePort": 30081,"name": "http"},{"port": 443,"targetPort": 8080,"nodePort": 30443,"name": "https"}]}}'
      register: argo_patch
      failed_when: argo_patch.rc != 0
      changed_when: '"patched" in argo_patch.stdout'

    - name: Copy ArgoCD Application tracking config
      copy:
        src: ../k8s/argocd-app.yaml
        dest: /home/ubuntu/argocd-app.yaml
        owner: ubuntu
        group: ubuntu

    - name: Apply ArgoCD Application config
      command: microk8s kubectl apply -f /home/ubuntu/argocd-app.yaml
      register: app_apply
      changed_when: '"created" in app_apply.stdout or "configured" in app_apply.stdout'
