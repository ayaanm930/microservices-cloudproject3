apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
      - name: data-service
        image: ghcr.io/ayaanm930/microservices-cloudproject3/data-service:41c023bc07edc9117943d1110d604b5c4f306ed5
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
spec:
  selector:
    app: data-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
