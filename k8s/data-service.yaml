apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
      - name: data-service
        image: ghcr.io/ayaanm930/microservices-cloudproject3/data-service:a7b82301b0e71fabaf4ebbd6c4d8e43d63d7dd6b
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
spec:
  selector:
    app: data-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
